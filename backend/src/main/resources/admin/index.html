<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoCare Admin</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b0e;
      --panel: #11171c;
      --line: #2b343b;
      --text: #f4f7f6;
      --muted: #9eaaa6;
      --accent: #9fe6cc;
      --danger: #ff8a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #151d22, var(--bg) 42%, #0b0f13);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 32px; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    p { color: var(--muted); margin: 8px 0 0; }
    .grid {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 16px;
    }
    section {
      background: color-mix(in srgb, var(--panel), transparent 4%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0b1014;
      color: var(--text);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      background: var(--accent);
      color: #07100d;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
      word-break: break-word;
    }
    .error { color: var(--danger); }
    .danger {
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger), transparent 55%);
    }
    .table-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .table-actions button {
      padding: 7px 9px;
      font-size: 12px;
    }
    .catalog-thumb {
      width: 92px;
      height: 56px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #080c10;
      color: var(--muted);
      font-size: 12px;
    }
    .catalog-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .preview {
      display: grid;
      place-items: center;
      min-height: 180px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      margin-top: 12px;
      overflow: hidden;
      background: #080c10;
    }
    .preview img {
      max-width: 100%;
      max-height: 240px;
      object-fit: contain;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 6px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>AutoCare Admin</h1>
        <p>Загрузка фото и добавление моделей в каталог приложения.</p>
      </div>
      <button class="secondary" id="refreshCatalog">Обновить каталог</button>
    </header>

    <div class="grid">
      <section>
        <h2>Аккаунт</h2>
        <label>Имя
          <input id="name" value="Администратор" autocomplete="name" />
        </label>
        <label>Email
          <input id="email" value="admin@autocare.local" autocomplete="email" />
        </label>
        <label>Пароль
          <input id="password" type="password" value="admin1234" autocomplete="current-password" />
        </label>
        <div class="actions">
          <button id="login">Войти</button>
          <button class="secondary" id="register">Зарегистрировать</button>
        </div>
        <div class="status" id="authStatus"></div>
      </section>

      <section>
        <h2>Фото</h2>
        <label>Файл PNG, JPG или WebP
          <input id="photo" type="file" accept="image/png,image/jpeg,image/webp" />
        </label>
        <div class="actions">
          <button id="upload">Загрузить фото</button>
          <button class="secondary" id="useUrl">Использовать URL ниже</button>
        </div>
        <label>URL изображения
          <input id="imageUrl" placeholder="http://localhost:8080/uploads/..." />
        </label>
        <div class="preview" id="preview">Предпросмотр появится здесь</div>
        <div class="status" id="photoStatus"></div>
      </section>

      <section>
        <h2>Новая модель</h2>
        <div class="row">
          <label>Марка <input id="brand" placeholder="Toyota" /></label>
          <label>Модель <input id="model" placeholder="Camry" /></label>
        </div>
        <div class="row">
          <label>Поколение <input id="generation" placeholder="XV70" /></label>
          <label>Рестайлинг <input id="restyling" placeholder="рестайлинг" /></label>
        </div>
        <div class="row">
          <label>Год от <input id="yearFrom" type="number" value="2021" /></label>
          <label>Год до <input id="yearTo" type="number" value="2024" /></label>
        </div>
        <div class="row">
          <label>Комплектация <input id="trim" placeholder="Elegance" /></label>
          <label>Тип топлива <input id="fuelType" value="Бензин" /></label>
        </div>
        <div class="row">
          <label>Цвет <input id="colorName" placeholder="Белый" /></label>
          <label>HEX <input id="colorHex" value="#F3F4F6" /></label>
        </div>
        <div class="actions">
          <button id="saveCatalog">Добавить в каталог</button>
          <button class="secondary" id="resetCatalogForm" type="button">Сбросить</button>
        </div>
        <div class="status" id="catalogStatus"></div>
      </section>

      <section>
        <h2>Каталог</h2>
        <p>Показываются последние 30 записей.</p>
        <table>
          <thead>
            <tr>
              <th>Фото</th>
              <th>Авто</th>
              <th>Годы</th>
              <th>Комплектация</th>
              <th>Цвет</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="catalogRows"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    const api = location.origin;
    let token = localStorage.getItem("autocare_admin_token") || "";
    let catalog = [];
    let editingCatalogId = null;
    let variantSourceId = null;

    const byId = (id) => document.getElementById(id);
    const status = (id, text, error = false) => {
      const node = byId(id);
      node.textContent = text;
      node.classList.toggle("error", error);
    };
    const escapeHtml = (value = "") => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
    const imageSrc = (url = "") => {
      if (!url) return "";
      if (/^https?:\/\//i.test(url)) return url;
      return `${api}${url.startsWith("/") ? "" : "/"}${url}`;
    };
    const catalogImage = (url) => {
      const src = imageSrc(url);
      if (!src) return `<div class="catalog-thumb">Нет фото</div>`;
      return `<div class="catalog-thumb"><img src="${escapeHtml(src)}" alt="Фото авто" loading="lazy" onerror="this.parentElement.textContent='Нет фото'" /></div>`;
    };

    async function request(path, options = {}) {
      const headers = options.headers || {};
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(`${api}${path}`, { ...options, headers });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) throw new Error(data?.message || `HTTP ${response.status}`);
      return data;
    }

    async function auth(path) {
      const body = {
        name: byId("name").value,
        email: byId("email").value,
        password: byId("password").value
      };
      const data = await request(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      token = data.token;
      localStorage.setItem("autocare_admin_token", token);
      status("authStatus", `Готово. Токен сохранен для ${data.user.email}`);
    }

    byId("login").onclick = () => auth("/auth/login").catch((e) => status("authStatus", e.message, true));
    byId("register").onclick = () => auth("/auth/register").catch((e) => status("authStatus", e.message, true));

    byId("upload").onclick = async () => {
      try {
        const file = byId("photo").files[0];
        if (!file) throw new Error("Выберите файл");
        const form = new FormData();
        form.append("photo", file);
        const data = await request("/cars/photos", { method: "POST", body: form });
        const absoluteUrl = `${api}${data.url}`;
        byId("imageUrl").value = absoluteUrl;
        renderPreview(absoluteUrl);
        status("photoStatus", `Фото загружено: ${absoluteUrl}`);
      } catch (e) {
        status("photoStatus", e.message, true);
      }
    };

    byId("useUrl").onclick = () => renderPreview(byId("imageUrl").value);
    byId("imageUrl").oninput = () => renderPreview(byId("imageUrl").value);

    function renderPreview(url) {
      byId("preview").innerHTML = url
        ? `<img src="${url}" alt="preview" />`
        : "Предпросмотр появится здесь";
    }

    function catalogPayload() {
      return {
        brand: byId("brand").value,
        model: byId("model").value,
        generation: byId("generation").value,
        restyling: byId("restyling").value,
        yearFrom: Number(byId("yearFrom").value),
        yearTo: Number(byId("yearTo").value),
        trim: byId("trim").value,
        fuelType: byId("fuelType").value,
        colorName: byId("colorName").value,
        colorHex: byId("colorHex").value,
        imageUrl: byId("imageUrl").value
      };
    }

    function resetCatalogForm() {
      editingCatalogId = null;
      variantSourceId = null;
      byId("saveCatalog").textContent = "Добавить в каталог";
      for (const id of ["brand", "model", "generation", "restyling", "trim", "colorName"]) byId(id).value = "";
      byId("yearFrom").value = "2021";
      byId("yearTo").value = "2024";
      byId("fuelType").value = "Бензин";
      byId("colorHex").value = "#F3F4F6";
      status("catalogStatus", "");
    }

    byId("resetCatalogForm").onclick = resetCatalogForm;

    byId("saveCatalog").onclick = async () => {
      try {
        const path = editingCatalogId ? `/admin/catalog/${editingCatalogId}` : "/admin/catalog";
        const method = editingCatalogId ? "PUT" : "POST";
        await request(path, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(catalogPayload())
        });
        status("catalogStatus", editingCatalogId ? "Запись обновлена" : "Запись добавлена");
        resetCatalogForm();
        loadCatalog();
      } catch (e) {
        status("catalogStatus", e.message, true);
      }
    };

    window.editCatalog = (id) => {
      const row = catalog.find((item) => item.id === id);
      if (!row) return;
      editingCatalogId = id;
      variantSourceId = null;
      byId("saveCatalog").textContent = "Сохранить изменения";
      byId("brand").value = row.brand;
      byId("model").value = row.model;
      byId("generation").value = row.generation;
      byId("restyling").value = row.restyling;
      byId("yearFrom").value = row.yearFrom;
      byId("yearTo").value = row.yearTo;
      byId("trim").value = row.trim;
      byId("fuelType").value = row.fuelType;
      byId("colorName").value = row.colorName;
      byId("colorHex").value = row.colorHex;
      byId("imageUrl").value = row.imageUrl;
      renderPreview(row.imageUrl);
      status("catalogStatus", `Редактирование записи #${id}`);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.addVariant = (id) => {
      const row = catalog.find((item) => item.id === id);
      if (!row) return;
      editingCatalogId = null;
      variantSourceId = id;
      byId("saveCatalog").textContent = "Добавить вариант";
      byId("brand").value = row.brand;
      byId("model").value = row.model;
      byId("generation").value = row.generation;
      byId("restyling").value = row.restyling;
      byId("yearFrom").value = row.yearFrom;
      byId("yearTo").value = row.yearTo;
      byId("trim").value = row.trim;
      byId("fuelType").value = row.fuelType;
      byId("colorName").value = row.colorName;
      byId("colorHex").value = row.colorHex;
      byId("imageUrl").value = row.imageUrl;
      renderPreview(row.imageUrl);
      status("catalogStatus", `Новый вариант на основе записи #${id}. Измени комплектацию, цвет или фото и сохрани.`);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.deleteCatalog = async (id) => {
      const row = catalog.find((item) => item.id === id);
      const label = row ? `${row.brand} ${row.model} ${row.trim} ${row.colorName}` : `#${id}`;
      if (!confirm(`Удалить запись ${label}?`)) return;
      try {
        await request(`/admin/catalog/${id}`, { method: "DELETE" });
        if (editingCatalogId === id) resetCatalogForm();
        status("catalogStatus", "Запись удалена");
        loadCatalog();
      } catch (e) {
        status("catalogStatus", e.message, true);
      }
    };

    async function loadCatalog() {
      try {
        catalog = await request("/cars/catalog");
        byId("catalogRows").innerHTML = catalog.slice(-30).reverse().map((row) => `
          <tr>
            <td>${catalogImage(row.imageUrl)}</td>
            <td>${escapeHtml(row.brand)} ${escapeHtml(row.model)}<br><small>${escapeHtml(row.generation)} ${escapeHtml(row.restyling)}</small></td>
            <td>${row.yearFrom}-${row.yearTo}</td>
            <td>${escapeHtml(row.trim)}</td>
            <td><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${escapeHtml(row.colorHex)};border:1px solid #555"></span> ${escapeHtml(row.colorName)}</td>
            <td>
              <div class="table-actions">
                <button class="secondary" onclick="editCatalog(${row.id})">Редактировать</button>
                <button class="secondary" onclick="addVariant(${row.id})">Добавить вариант</button>
                <button class="secondary danger" onclick="deleteCatalog(${row.id})">Удалить</button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch (e) {
        byId("catalogRows").innerHTML = `<tr><td colspan="6">${escapeHtml(e.message)}</td></tr>`;
      }
    }

    byId("refreshCatalog").onclick = loadCatalog;

    loadCatalog();
  </script>
</body>
</html>
